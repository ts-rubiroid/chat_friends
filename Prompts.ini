    return Scaffold(
      appBar: AppBar(
        title: Text(widget.chat.name),
      ),
      body: Column(
        children: [
          if (_image != null || _file != null)
            Container(
              padding: EdgeInsets.all(10),
              color: Colors.grey[200],
              child: Row(
                children: [
                  Icon(_image != null ? Icons.image : Icons.insert_drive_file),
                  SizedBox(width: 10),
                  Expanded(
                    child: Text(
                      _image?.path.split('/').last ??
