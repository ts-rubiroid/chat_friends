  static Future<Chat> getChatDetail(int chatId) async {
    final headers = await _getHeaders();
    final url = Uri.parse(ApiConfig.chatDetailEndpoint(chatId)); // ← ИСПРАВЛЕНО

    ApiConfig.logRequest('GET', url.toString());
    
