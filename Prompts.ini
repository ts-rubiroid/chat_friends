import 'package:flutter/material.dart';
import 'package:image_picker/image_picker.dart';
import 'package:file_picker/file_picker.dart';
import 'dart:io';
import 'package:chat_friends/services/api_service.dart';
import 'package:chat_friends/models/chat.dart';
import 'package:chat_friends/models/message.dart';
import 'package:chat_friends/models/user.dart'; // ДОБАВЛЕН ИМПОРТ
import '../utils/api.dart';

class ChatScreen extends StatefulWidget {
  final Chat chat;

  ChatScreen({required this.chat});

  @override
  _ChatScreenState createState() => _ChatScreenState();
}

class _ChatScreenState extends State<ChatScreen> {
  final _messageController = TextEditingController();
  final _focusNode = FocusNode();
  List<Message> _messages = [];
  bool _isLoading = true;
  File? _image;
  File? _file;
  bool _isSending = false;
  User? _currentUser;

  @override
  void initState() {
    super.initState();
    _loadInitialData();
    _startPolling();
    
    WidgetsBinding.instance.addPostFrameCallback((_) {
      if (mounted) {
        _focusNode.requestFocus();
      }
    });
  }

  @override
  void dispose() {
    _messageController.dispose();
    _focusNode.dispose();
    super.dispose();
  }

  Future<void> _loadInitialData() async {
    try {
      final currentUser = await ApiService.getCurrentUser();
      final messages = await ApiService.getMessages(widget.chat.id);
      
      setState(() {
        _currentUser = currentUser;
        _messages = messages;
        _isLoading = false;
      });
    } catch (e) {
      print('Ошибка загрузки данных: $e');
      setState(() {
        _isLoading = false;
      });
    }
  }

  Future<void> _loadMessages() async {
    try {
      final messages = await ApiService.getMessages(widget.chat.id);
      if (mounted) {
        setState(() {
          _messages = messages;
        });
      }
    } catch (e) {
      print('Ошибка обновления сообщений: $e');
    }
  }

  void _startPolling() {
    Future.delayed(Duration(seconds: 5), () {
      if (mounted) {
        _loadMessages();
        _startPolling();
      }
    });
  }

  Future<void> _pickImage() async {
    final picker = ImagePicker();
    final pickedFile = await picker.pickImage(source: ImageSource.gallery);
    
    if (pickedFile != null) {
      setState(() {
        _image = File(pickedFile.path);
        _file = null;
      });
      _focusNode.requestFocus();
    }
  }

  Future<void> _pickFile() async {
    final result = await FilePicker.platform.pickFiles();
    
    if (result != null) {
      setState(() {
        _file = File(result.files.single.path!);
        _image = null;
      });
      _focusNode.requestFocus();
    }
  }

  Future<void> _sendMessage() async {
    if (_messageController.text.isEmpty && _image == null && _file == null) {
      return;
    }

    if (_isSending) return;

    final text = _messageController.text;
    
    setState(() {
      _isSending = true;
    });

    try {
      Message message;
      
      if (_image != null) {
        message = await ApiService.sendMessageWithFile(
          widget.chat.id,
          text.isNotEmpty ? text : 'Изображение',
          _image!,
          'image',
        );
      } else if (_file != null) {
        message = await ApiService.sendMessageWithFile(
          widget.chat.id,
          text.isNotEmpty ? text : 'Файл',
          _file!,
          'file',
        );
      } else {
        message = await ApiService.sendTextMessage(
          widget.chat.id,
          text,
        );
      }

      _messageController.clear();
      
      if (mounted) {
        setState(() {
          _messages.add(message);
          _image = null;
          _file = null;
          _isSending = false;
        });
      }
      
      _focusNode.requestFocus();
      
    } catch (e) {
      print('Ошибка отправки: $e');
      if (mounted) {
        ScaffoldMessenger.of(context).showSnackBar(
          SnackBar(content: Text('Ошибка отправки: $e')),
        );
        setState(() {
          _isSending = false;
        });
      }
    }
  }

  @override
