description: "Корпоративный чат для узкого круга"
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.5.4
  image_picker: ^1.2.1
  file_picker: ^10.3.0
  cached_network_image: ^3.3.0
